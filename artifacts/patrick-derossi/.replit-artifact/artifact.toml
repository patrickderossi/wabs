kind = "web"
previewPath = "/"
title = "Patrick De Rossi Design & Drafting"
version = "1.0.0"
id = "artifacts/patrick-derossi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26033

[services.development]
run = "pnpm --filter @workspace/patrick-derossi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/patrick-derossi", "run", "build" ]
publicDir = "artifacts/patrick-derossi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26033"
BASE_PATH = "/"
