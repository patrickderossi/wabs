<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with subtle rounded corners -->
  <rect width="32" height="32" rx="4" fill="#0d0d0d"/>
  <!-- Gold accent bar at top -->
  <rect x="0" y="0" width="32" height="2" rx="1" fill="#c9a84c"/>
  <!-- W letterform - two V shapes side by side -->
  <polyline points="4,8 7,22 10,14 13,22 16,8" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- A letterform -->
  <polyline points="17,22 21,8 25,22" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="18.8" y1="17" x2="23.2" y2="17" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round"/>
</svg>
